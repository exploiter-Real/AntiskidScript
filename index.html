<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --secondary: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 { margin-top: 0; font-weight: 600; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
        }

        #actionButton { background-color: var(--accent); color: var(--bg-color); }
        #secondaryButton { background-color: var(--secondary); color: white; }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard</h1>
        <p>Select a process to execute:</p>
        
        <div class="btn-group">
            <button id="actionButton">Run Primary Process</button>
            <button id="secondaryButton">Run Secondary Task</button>
        </div>
    </div>

    <!-- Connecting the external file -->
    <script src="exploit.js"></script>
    <script>
        document.getElementById('actionButton').addEventListener('click', () => {
            if (typeof startProcess === 'function') {
                startProcess();
            } else {
                console.error("Function 'startProcess' not found in exploit.js");
            }
        });

        document.getElementById('secondaryButton').addEventListener('click', () => {
            if (typeof runSecondaryTask === 'function') {
                runSecondaryTask();
            } else {
                console.error("Function 'runSecondaryTask' not found in exploit.js");
            }
        });
    </script>
</body>
</html>
